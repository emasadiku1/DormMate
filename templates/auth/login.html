{% extends "layout.html" %}
{% block title %}Log in — DormMate{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="form-card reveal is-visible">
    <p class="eyebrow">Welcome back</p>
    <h1>Log in</h1>

    <form method="post" class="form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ email or '' }}" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn--primary btn--lg form__submit">Log in</button>
    </form>

    <p class="form-card__footer">New here? <a href="{{ url_for('auth.signup') }}">Create an account</a></p>
  </div>
</div>
{% endblock %}
